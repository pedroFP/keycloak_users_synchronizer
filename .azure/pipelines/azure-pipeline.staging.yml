trigger:
  batch: true
  branches:
    include:
      - staging

pool:
  CI # pipeline always runs on this pool


variables:
  CI_COMMIT_SHORT_SHA: $(Build.BuildId)
  BUILD_DIR: $(Build.SourcesDirectory)
  COMPOSE_FILE: .docker/docker-compose.staging.yml

stages:
  - stage: Build
    displayName: Build
    jobs:
      - job: build_container
        steps:
          - script: |
              docker compose build ci
              docker compose -p $(APP_NAME)_$(CI_COMMIT_SHORT_SHA) up -d
            displayName: build

  - template: templates/publish_deploy_artifact_stage.yml

  - stage: CleanUp
    condition: always()
    displayName: Clean Up
    jobs:
     - job: clean_up
       displayName: CleanUp
       continueOnError: true
       steps:
       - template: templates/clean_up/clean_up_job.yml
